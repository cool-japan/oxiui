# ============================================================================
# COOLJAPAN Pure Rust Policy v2 — scope model for this deny.toml
# ----------------------------------------------------------------------------
# This deny.toml enforces the "never GTK/Qt/SDL/system-font-C/crypto-C" bans
# across the workspace's DEFAULT-feature closures (see [bans] below).
#
# It does NOT set `[graph] all-features = true`. Under Pure Rust Policy v2 the
# authoritative L1 gate — the `--all-features` no-non-allowlisted-FFI invariant
# — is verified PER PURE CRATE via:
#     cargo tree -p <crate> --all-features -e normal,build
# and NOT via a workspace-wide all-features scan here.
#
# `oxiui-tray`, `oxiui-hot-reload-notify`, and `oxiui-slint` are §5 quarantine /
# known-non-pure crates: they intentionally pull C FFI (tray-icon -> GTK;
# notify -> inotify-sys/fsevent-sys; slint -> yeslogic-fontconfig-sys) and are
# EXCLUDED from the L1 pure-set. `cargo deny check bans` is meant to run over the
# pure-set only; running it against these crates' own graphs is EXPECTED to
# surface their quarantined FFI and is NOT a violation.
#
# The pure facade `oxiui` and `oxiui-compute-wgpu` are verified FFI-free
# (host + linux target) as of 0.2.0.
# ============================================================================

[advisories]
ignore = []

[licenses]
allow = ["Apache-2.0", "MIT", "ISC", "Unicode-3.0", "BSD-2-Clause", "BSD-3-Clause", "OpenSSL"]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
deny = [
  # GTK C bindings
  { name = "gtk" },
  { name = "gtk-sys" },
  { name = "gtk4" },
  { name = "gtk4-sys" },
  # Qt C++ bindings
  { name = "qmetaobject" },
  { name = "qt_core" },
  { name = "qt_gui" },
  { name = "qt_widgets" },
  # SDL C bindings
  { name = "sdl2" },
  { name = "sdl2-sys" },
  # System font C libraries
  { name = "freetype-sys" },
  { name = "harfbuzz-sys" },
  { name = "pango-sys" },
  { name = "fontconfig-sys" },
  # Standard noffi forbids (crypto C)
  { name = "ring" },
  { name = "aws-lc-sys" },
  { name = "openssl-sys" },
  { name = "native-tls" },
  # Compression must use oxiarc
  { name = "flate2" },
  { name = "brotli" },
  { name = "miniz_oxide" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
